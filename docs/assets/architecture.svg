<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1024"
  height="768"
  viewBox="0 0 1024 768"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">LI.FI FeesCollected scanner architecture</title>
  <desc id="desc">
    Architecture showing EVM RPC providers feeding the one-shot scanner, MongoDB storage,
    the Events API, and HTTP clients.
  </desc>
  <defs>
    <marker
      id="arrow-orange"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
      markerUnits="strokeWidth"
    >
      <path
        d="M2,2 L10,6 L2,10"
        fill="none"
        stroke="#d97706"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arrow-purple"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
      markerUnits="strokeWidth"
    >
      <path
        d="M2,2 L10,6 L2,10"
        fill="none"
        stroke="#7c3aed"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arrow-blue"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
      markerUnits="strokeWidth"
    >
      <path
        d="M2,2 L10,6 L2,10"
        fill="none"
        stroke="#0284c7"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arrow-green"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
      markerUnits="strokeWidth"
    >
      <path
        d="M2,2 L10,6 L2,10"
        fill="none"
        stroke="#16a34a"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <style>
      text {
        font-family:
          'Comic Sans MS',
          'Segoe Print',
          ui-sans-serif,
          system-ui,
          sans-serif;
        fill: #0f172a;
      }
      .title {
        font-size: 32px;
        font-weight: 700;
      }
      .section {
        font-size: 17px;
        font-weight: 700;
      }
      .label {
        font-size: 14px;
        font-weight: 600;
      }
      .small {
        font-size: 12px;
        fill: #334155;
      }
      .mono {
        font-family: 'Comic Sans MS', 'Segoe Print', monospace;
        font-size: 11px;
        fill: #334155;
      }
      .orange {
        stroke: #d97706;
        fill: #ffedd5;
      }
      .purple {
        stroke: #7c3aed;
        fill: #ede9fe;
      }
      .cyan {
        stroke: #0891b2;
        fill: #cffafe;
      }
      .green {
        stroke: #16a34a;
        fill: #dcfce7;
      }
      .blue {
        stroke: #2563eb;
        fill: #dbeafe;
      }
      .box {
        stroke-width: 2.5;
        rx: 20;
        ry: 20;
      }
      .inner {
        stroke-width: 2;
        rx: 14;
        ry: 14;
      }
      .dashed {
        stroke-dasharray: 10 8;
      }
      .arrow {
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <rect width="1024" height="768" fill="#ffffff" />
  <text x="512" y="40" text-anchor="middle" class="title">LI.FI FeesCollected Scanner</text>

  <rect x="54" y="83" width="815" height="118" class="box blue" opacity="0.18" />
  <text x="72" y="108" class="label" fill="#2563eb">EVM RPC providers (per chain, ethers v5)</text>
  <rect x="96" y="126" width="215" height="64" class="inner blue" opacity="0.42" />
  <text x="204" y="163" text-anchor="middle" class="section" fill="#2563eb">Polygon RPC</text>
  <rect x="343" y="126" width="215" height="64" class="inner blue" opacity="0.42" />
  <text x="451" y="163" text-anchor="middle" class="section" fill="#2563eb">Ethereum RPC</text>
  <rect x="589" y="124" width="216" height="66" class="inner blue dashed" opacity="0.16" />
  <text x="697" y="163" text-anchor="middle" class="label" fill="#2563eb">+ any EVM chain</text>

  <path d="M462 202 V253" class="arrow" stroke="#2563eb" marker-end="url(#arrow-blue)" />
  <text x="462" y="224" text-anchor="middle" class="mono" fill="#2563eb">queryFilter + reorg</text>
  <text x="462" y="239" text-anchor="middle" class="mono" fill="#2563eb">revalidate</text>

  <rect x="10" y="265" width="150" height="86" class="inner orange dashed" />
  <text x="29" y="292" class="label" fill="#92400e">Cron / k8s</text>
  <text x="29" y="315" class="small">CronJob</text>
  <text x="29" y="336" class="small">flock guard</text>
  <path d="M160 308 H203" class="arrow" stroke="#d97706" marker-end="url(#arrow-orange)" />
  <text x="158" y="308" class="mono" fill="#d97706">invoke</text>

  <rect x="204" y="260" width="665" height="160" class="box purple" opacity="0.48" />
  <text x="225" y="291" class="section" fill="#4c1d95">Scanner - one-shot CLI</text>
  <text x="225" y="316" class="mono">npm run scan -- --chain &lt;name&gt; | --chainId &lt;id&gt;</text>
  <text x="225" y="342" class="small">• Chunked scan up to safeTip • adaptive halving (floor 16)</text>
  <text x="225" y="365" class="small">• Bounded reorg revalidate (last reorgWindow blocks)</text>
  <text x="225" y="388" class="small">• Idempotent upsert (chainId, txHash, logIndex)</text>
  <text x="225" y="411" class="small">• Cursor advances on bulkWrite ok • graceful SIGTERM</text>

  <path d="M462 420 V468" class="arrow" stroke="#7c3aed" marker-end="url(#arrow-purple)" />
  <text x="461" y="438" text-anchor="middle" class="mono" fill="#7c3aed">bulkWrite + delete</text>
  <text x="461" y="454" text-anchor="middle" class="mono" fill="#7c3aed">stale</text>

  <rect x="75" y="469" width="772" height="149" class="box green" opacity="0.18" />
  <text x="94" y="496" class="label" fill="#166534">MongoDB • Mongoose + Typegoose</text>
  <rect x="117" y="512" width="344" height="97" class="inner green" opacity="0.28" />
  <text x="136" y="540" class="label" fill="#166534">fee_collected_events</text>
  <text x="136" y="563" class="mono">unique (chainId, txHash, logIndex)</text>
  <text x="136" y="584" class="mono">idx (integrator, blockNumber↓, logIndex↓)</text>
  <rect x="482" y="512" width="344" height="97" class="inner green" opacity="0.28" />
  <text x="500" y="540" class="label" fill="#166534">scan_state</text>
  <text x="500" y="563" class="mono">unique (chainId, contractAddress)</text>
  <text x="500" y="584" class="mono">lastScannedBlock cursor</text>

  <path d="M462 618 V665" class="arrow" stroke="#16a34a" marker-end="url(#arrow-green)" />
  <text x="462" y="644" text-anchor="middle" class="mono" fill="#16a34a">find() + readState</text>

  <rect x="97" y="667" width="728" height="118" class="box orange" opacity="0.52" />
  <text x="118" y="697" class="section" fill="#92400e">Events API - long-running HTTP server</text>
  <text x="118" y="719" class="mono">npm run serve • PORT=3000</text>
  <rect x="118" y="733" width="450" height="38" class="inner orange" opacity="0.28" />
  <text x="343" y="757" text-anchor="middle" class="mono" fill="#d97706">
    GET /events?integrator + chain/token/limit/offset
  </text>
  <rect x="580" y="733" width="223" height="38" class="inner orange" opacity="0.28" />
  <text x="692" y="757" text-anchor="middle" class="mono" fill="#d97706">
    GET /health (per-chain freshness)
  </text>

  <path d="M825 728 H884" class="arrow" stroke="#d97706" marker-end="url(#arrow-orange)" />
  <text x="838" y="726" class="mono" fill="#d97706">JSON</text>
  <rect x="884" y="699" width="128" height="56" class="inner purple" opacity="0.58" />
  <text x="948" y="733" text-anchor="middle" class="label" fill="#7c3aed">HTTP client</text>
</svg>
