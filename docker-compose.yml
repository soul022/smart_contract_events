services:
  mongodb:
    # Bound to localhost so the compose network keeps it reachable from
    # fees-scanner and events-api, but the host does not expose 27017 publicly.
    ports:
      - '127.0.0.1:27017:27017'
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  fees-scanner:
    build: .
    image: lifi-fees-scanner:latest
    entrypoint: ['node', 'dist/scanner/cli.js']
    command: ['--chain', 'polygon']
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/lifi_events
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    # In-flight retry backoff can stack to ~16s before the cancellation flag
    # is observed between chunks. 30s leaves headroom over Docker's default 10s.
    stop_grace_period: 30s
    restart: 'no'

  events-api:
    build: .
    image: lifi-fees-scanner:latest
    entrypoint: ['node', 'dist/api/cli.js']
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/lifi_events
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    # API drains in-flight requests for up to 10s before disconnecting Mongo.
    stop_grace_period: 15s
    restart: unless-stopped

volumes:
  mongo_data:
